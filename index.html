<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI学習アシスタント</title>
  <style>
    body {
      background-color: #fdf6e3; text-align: center;
      font-family: 'Hiragino Maru Gothic ProN', sans-serif; 
      padding: 30px 15px; color: #333;
    }
    h1 { font-size: 35px; color: #ff8c00; margin-bottom: 20px; }
    .action-btn {
      font-size: 20px; padding: 15px 25px; color: white; border: none;
      border-radius: 15px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); margin: 10px; cursor: pointer;
    }
    #grade-select {
      background-color: #ffd700; color: #333; font-weight: bold; font-size: 20px;
    }
    #mic-btn { background-color: #32cd32; }
    #camera-label { background-color: #1e90ff; display: inline-block; }
    #result-box {
      background-color: white; border-radius: 15px; padding: 25px; margin-top: 30px;
      font-size: 22px; min-height: 100px; text-align: left; line-height: 1.6;
    }
    #setup-screen {
      background: white; padding: 30px; border-radius: 15px; margin-top: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    #key-input { font-size: 18px; padding: 15px; width: 80%; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 20px; }
  </style>
</head>
<body>

  <h1>✨ AI学習アシスタント ✨</h1>

  <div id="setup-screen">
    <h3>【大人用】最初の設定</h3>
    <p>GeminiのAPIキーを入力してください。</p>
    <input type="password" id="key-input" placeholder="AIzaSy..."><br>
    <button id="save-key-btn" class="action-btn" style="background-color: #ff8c00;">保存してスタート</button>
  </div>

  <div id="main-app" style="display: none;">
    <select id="grade-select" class="action-btn">
      <option value="小学4年生">🎒 小学4年生</option>
      <option value="小学2年生" selected>🎒 小学2年生</option>
    </select>
    <br>

    <label id="camera-label" class="action-btn" for="camera-input">📷 問題を撮る</label>
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none;">
    <button id="mic-btn" class="action-btn">🎤 質問する</button>

    <img id="image-preview" src="" style="max-width: 80%; border-radius: 10px; margin: 15px auto; display: none;">

    <div id="result-box" style="text-align: center;">ここにジェミニの答えが出ます💡</div>
    
    <button id="reset-key-btn" style="margin-top: 40px; font-size: 14px; color: gray; background: none; border: none; text-decoration: underline; cursor: pointer;">APIキーを再設定する</button>
  </div>

  <script>
    const setupScreen = document.getElementById('setup-screen');
    const mainApp = document.getElementById('main-app');
    const keyInput = document.getElementById('key-input');
    const saveKeyBtn = document.getElementById('save-key-btn');
    const resetKeyBtn = document.getElementById('reset-key-btn');
    const gradeSelect = document.getElementById('grade-select');
    const micBtn = document.getElementById("mic-btn");
    const resultBox = document.getElementById("result-box");
    const cameraInput = document.getElementById("camera-input");
    const imagePreview = document.getElementById("image-preview");

    let currentImageBase64 = null;
    let currentMimeType = null;

    function checkApiKey() {
      if (localStorage.getItem('gemini_api_key')) {
        setupScreen.style.display = 'none'; mainApp.style.display = 'block';
      } else {
        setupScreen.style.display = 'block'; mainApp.style.display = 'none';
      }
    }
    checkApiKey();

    saveKeyBtn.onclick = () => {
      const key = keyInput.value.trim();
      if (key) { localStorage.setItem('gemini_api_key', key); checkApiKey(); }
    };
    resetKeyBtn.onclick = () => { localStorage.removeItem('gemini_api_key'); checkApiKey(); };

    cameraInput.onchange = (event) => {
      const file = event.target.files[0];
      if (file) {
        currentMimeType = "image/jpeg";
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 1600;
            let width = img.width; let height = img.height;
            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
            else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            
            const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
            imagePreview.src = dataUrl; imagePreview.style.display = "block";
            currentImageBase64 = dataUrl.split(',')[1];
            
            resultBox.style.textAlign = "center";
            resultBox.innerHTML = "📸 写真をセットしたよ！<br>「🎤 質問する」を押して聞いてみてね！";
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    };

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
      const recognition = new SpeechRecognition();
      recognition.lang = "ja-JP";

      micBtn.onclick = () => {
        resultBox.style.textAlign = "center";
        resultBox.innerHTML = "🗣️ お話を聞いています...";
        recognition.start();
      };

      recognition.onresult = async (event) => {
        const text = event.results[0][0].transcript;
        resultBox.style.textAlign = "center";
        resultBox.innerHTML = "「" + text + "」<br><br>🧠✨ 一生懸命考えているよ...（数秒待ってね）";

        const apiKey = localStorage.getItem('gemini_api_key');
        const selectedGrade = gradeSelect.value;
        
        // ★ユーザー様のアイデアを組み込んだ最強のルール★
        const systemInstruction = `
【絶対に守るべき厳格なルール】
1. 相手は「${selectedGrade}」です。${selectedGrade}で習う漢字や言葉のレベルに合わせて、優しく教えてください。
2. 回答の最初は必ず「『（あなたが画像から読み取った問題文）』という問題だね？合っているかな？」と、自分の読み取りが正しいか子供に確認してください。
3. 画像の文字を読むときは、絶対に勝手に想像して別の漢字（翼や飛など）を補わないでください。
4. 文字がぼやけていて自信がない部分がある場合は、「〇〇の部分がちょっと読めなかったんだけど、何て書いてあるかな？」と正直に聞いてください。
5. 子供が書いた答えが合っている場合は、たくさん褒めてあげてください。
6. 間違っている箇所があれば、いきなり答えを言うのではなく「〇〇の漢字の形、もう一回確認してみようか！」とヒントを出してください。
`;

        let parts = [{ "text": text }];
        if (currentImageBase64) {
          parts.push({ "inline_data": { "mime_type": currentMimeType, "data": currentImageBase64 } });
        }

        const data = {
          "system_instruction": { "parts": [{ "text": systemInstruction }] },
          "contents": [{ "parts": parts }]
        };

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });
          const json = await response.json();
          
          if (json.candidates && json.candidates[0].content) {
            const reply = json.candidates[0].content.parts[0].text;
            resultBox.style.textAlign = "left";
            resultBox.innerHTML = "💡 <b>ジェミニの答え：</b><br><br>" + reply.replace(/\n/g, '<br>');
          } else if (json.error) {
            resultBox.innerHTML = "ごめんなさい、エラーになっちゃった💦<br>理由：" + json.error.message;
          } else {
            resultBox.innerHTML = "ごめんなさい、うまく答えられませんでした💦";
          }
        } catch (error) {
          resultBox.innerHTML = "通信エラーが発生しました🔌";
        }
      };
      recognition.onerror = (event) => { resultBox.innerHTML = "うまく聞き取れませんでした（" + event.error + "）"; };
    } else {
      micBtn.style.display = "none"; resultBox.innerHTML = "お使いの端末はマイク機能に未対応です。";
    }
  </script>
</body>
</html>
